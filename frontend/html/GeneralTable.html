<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>общая таблица</title>
    <link rel="stylesheet" href="../css/GeneralTable.css">
</head>
<body>
    <div id="toolbar">
        <img src="../../design/cat.jpeg" alt="кот"">
        <button class="button" id="btnExport">
            <img src="../../design/cat.jpeg" alt="кот"">
            <span>экспортировать<br>данные в Excel</span>
        </button>
        <button class="button" id="btnAdd">
            <img src="../../design/cat.jpeg" alt="кот"">
            <span>добавить нового<br>абитуриента</span>
        </button>
    </div>
    <table class="table" id="generalTable">
        <thead>
            <tr>
                <th>фамилия на русском</th>
                <th>имя на русском</th>
                <th>фамилия на китайском</th>
                <th>имя на китайском</th>
                <th>код специализации</th>
                <th>название специализации</th>
                <th>электронная почта</th>
                <th>пароль</th>
                <th>СНИЛС</th>
                <th>номер паспорта</th>
                <th>срок действия паспорта</th>
                <th>кем выдан паспорт</th>
                <th>тип образования</th>
                <th>номер документа 1</th>
                <th>номер документа 2</th>
                <th>партнёр</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody> 
    </table>
    <script src="../js/api.js"></script>
    <script src="../js/table.js"></script>
</body>
</html>
